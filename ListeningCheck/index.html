<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />

    <script src="../Components/NavBar.js"></script>
    <title>ListeningCheck</title>
  </head>
  <body>
    <nav-bar></nav-bar>

    <div class="layout">
      <h1>ListeningCheck</h1>
      <fieldset class="controls-fieldset">
        <legend>Controls</legend>
        <div class="controls-row">
          <div class="control-group">
            <label for="audioFile">Audio File</label>
            <select id="audioFile">
              <option value="W 143rd Terr.m4a" selected>W 143rd Terr</option>
              <option value="W 143rd Terr 2.m4a">W 143rd Terr 2</option>
            </select>
          </div>

          <button id="stopAllBtn" class="stop-btn">⏹️ Stop All</button>

          <div class="control-group loop-group">
            <label for="loopToggle">Loop</label>
            <input type="checkbox" id="loopToggle" />
            <div class="loop-length-group" id="loopLengthGroup">
              <label
                ><input
                  type="radio"
                  name="loopLength"
                  value="forever"
                  checked
                />
                Forever</label
              >
              <label
                ><input type="radio" name="loopLength" value="5" /> 5
                seconds</label
              >
              <label
                ><input type="radio" name="loopLength" value="10" /> 10
                seconds</label
              >
            </div>
          </div>
        </div>
      </fieldset>

      <div class="btn-column-wrapper">
        <div class="btn-column" id="sectionA">
          <h2 class="column-header">Level One</h2>
          <audio
            id="audio_player_A"
            preload="auto"
            class="audio-player"
          ></audio>
          <button data-volume="1.0">
            10
            <span class="heard-indicator" title="I heard this">&#10003;</span>
          </button>
          <button data-volume="0.9">
            9 <span class="heard-indicator" title="I heard this">&#10003;</span>
          </button>
          <button data-volume="0.8">
            8 <span class="heard-indicator" title="I heard this">&#10003;</span>
          </button>
          <button data-volume="0.7">
            7 <span class="heard-indicator" title="I heard this">&#10003;</span>
          </button>
          <button data-volume="0.6">
            6 <span class="heard-indicator" title="I heard this">&#10003;</span>
          </button>
          <button data-volume="0.5">
            5 <span class="heard-indicator" title="I heard this">&#10003;</span>
          </button>
          <button data-volume="0.4">
            4 <span class="heard-indicator" title="I heard this">&#10003;</span>
          </button>
          <button data-volume="0.3">
            3 <span class="heard-indicator" title="I heard this">&#10003;</span>
          </button>
          <button data-volume="0.2">
            2 <span class="heard-indicator" title="I heard this">&#10003;</span>
          </button>
          <button data-volume="0.1">
            1 <span class="heard-indicator" title="I heard this">&#10003;</span>
          </button>
          <button data-volume="0">
            0 <span class="heard-indicator" title="I heard this">&#10003;</span>
          </button>
        </div>

        <div class="btn-column" id="sectionB">
          <h2 class="column-header">Level Two</h2>
          <audio
            id="audio_player_B"
            preload="auto"
            class="audio-player"
          ></audio>
          <button data-volume="1.0">
            10
            <span class="heard-indicator" title="I heard this">&#10003;</span>
          </button>
          <button data-volume="0.9">
            9 <span class="heard-indicator" title="I heard this">&#10003;</span>
          </button>
          <button data-volume="0.8">
            8 <span class="heard-indicator" title="I heard this">&#10003;</span>
          </button>
          <button data-volume="0.7">
            7 <span class="heard-indicator" title="I heard this">&#10003;</span>
          </button>
          <button data-volume="0.6">

          <button data-volume="0.5">

          </button>
          <button data-volume="0.4">
            4 <span class="heard-indicator" title="I heard this">&#10003;</span>
          </button>
          <button data-volume="0.3">
            3 <span class="heard-indicator" title="I heard this">&#10003;</span>
          </button>
          <button data-volume="0.2">
            2 <span class="heard-indicator" title="I heard this">&#10003;</span>
          </button>
          <button data-volume="0.1">
            1 <span class="heard-indicator" title="I heard this">&#10003;</span>
          </button>
          <button data-volume="0">
            0 <span class="heard-indicator" title="I heard this">&#10003;</span>
          </button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
