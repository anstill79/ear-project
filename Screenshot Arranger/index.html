<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />

    <script src="../Components/NavBar.js"></script>
    <title>Screenshot Arranger</title>
  </head>
  <body>
    <nav-bar><span slot="page-title">Screenshot Arranger</span></nav-bar>

    <div class="ui-bar">
      <span
        >Click a cell to select, then paste · or drag &amp; drop · double-click
        to browse files · Empty sections will be hidden when printing</span
      >

      <button class="btn btn-print" onclick="window.print()">
        &#9113; Print
      </button>
      <button
        class="btn btn-print"
        onclick="document.body.classList.toggle('print-preview')"
      >
        &#9113; Print Preview
      </button>
      <button class="btn btn-clear" onclick="clearAll()">Clear All</button>
    </div>
    <button
      class="btn btn-exit-preview"
      onclick="document.body.classList.remove('print-preview')"
    >
      &#10005; Exit Preview
    </button>

    <div class="sheet" id="sheet">
      <div class="sheet-header">
        <input
          class="sheet-title"
          type="text"
          placeholder="Test title…"
          maxlength="120"
          id="sheetTitle"
        />
        <input class="sheet-date" type="date" id="sheetDate" />
      </div>
      <div class="col-headers">
        <div class="ear-header right">Right Ear</div>
        <div class="ear-header left">Left Ear</div>
      </div>
      <div class="image-rows" id="imageRows"></div>
    </div>

    <input type="file" id="fileInput" accept="image/*" />
    <datalist id="test-label-options">
      <option value="Tympanometry"></option>
      <option value="Patulous: Baseline"></option>
      <option value="Patulous: Forced Breathing"></option>
      <option value="cVEMP"></option>
      <option value="oVEMP"></option>
    </datalist>

    <script src="script.js"></script>
  </body>
</html>
